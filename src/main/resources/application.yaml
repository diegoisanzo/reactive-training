resilience4j:
  timelimiter:
    instances:
      createBookTimeout:
        timeoutDuration: 2s
        cancelRunningFuture: true
      getBookByIdTimeout:
        timeoutDuration: 1s
        cancelRunningFuture: true
      getAllBooksTimeout:
        timeoutDuration: 3s
        cancelRunningFuture: true
      updateBookTimeout:
        timeoutDuration: 2s
        cancelRunningFuture: true
      deleteBookByIdTimeout:
        timeoutDuration: 1s
        cancelRunningFuture: true
  ratelimiter:
    instances:
      createBookRateLimit:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 0ms
      getAllBooksRateLimit:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 0ms
      getBookByIdRateLimit:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 0ms
      updateBookRateLimit:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 0ms
      deleteBookByIdRateLimit:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 0ms