jwt:
  secret: ${JWT_SECRET:reactive-training-jwt-secret-key-must-be-long-enough-for-hs256-algorithm}
  expiration-ms: 86400000

spring:
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_R2DBC_USERNAME:postgres}
    password: ${SPRING_R2DBC_PASSWORD:p}
  application:
    name: reactive-training
  threads:
    virtual:
      enabled: true

resilience4j:
  timelimiter:
    instances:
      createBookTimeout:
        timeoutDuration: 2s
        cancelRunningFuture: true
      getBookByIdTimeout:
        timeoutDuration: 1s
        cancelRunningFuture: true
      getAllBooksTimeout:
        timeoutDuration: 3s
        cancelRunningFuture: true
      updateBookTimeout:
        timeoutDuration: 2s
        cancelRunningFuture: true
      deleteBookByIdTimeout:
        timeoutDuration: 1s
        cancelRunningFuture: true
  ratelimiter:
    instances:
      createBookRateLimit:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 0ms
      getAllBooksRateLimit:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 0ms
      getBookByIdRateLimit:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 0ms
      updateBookRateLimit:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 0ms
      deleteBookByIdRateLimit:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 0ms